# Single-VPS production deploy.
#
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d
#
# Use when you'd rather run everything on one $5-10/mo VPS instead of
# Railway/Vercel/Neon. Postgres + Redis run in-container with named volumes
# so data survives `docker compose down`. Backend exposes :3001 (put nginx /
# Caddy in front for HTTPS + the frontend).
#
# The Chrome+extension must STILL run on a separate Windows host — this
# compose stack only handles backend + DB + Redis.

version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vfsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vfspass}
      POSTGRES_DB: ${POSTGRES_DB:-vfsdb}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vfsuser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Don't expose to the public — backend connects via service network.
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    expose:
      - "6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-vfsuser}:${POSTGRES_PASSWORD:-vfspass}@postgres:5432/${POSTGRES_DB:-vfsdb}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - sessions-data:/app/sessions
      - recordings-data:/app/recordings

volumes:
  postgres-data:
  redis-data:
  sessions-data:
  recordings-data:
